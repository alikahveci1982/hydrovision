<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>HydroVision AI Pro</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #2d2d2d; padding: 30px; border-radius: 15px; }
        input, button { padding: 10px; margin: 10px; border-radius: 5px; border: none; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #result { text-align: left; background: #eee; color: #333; padding: 15px; border-radius: 5px; margin-top: 20px; min-height: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 HYDROVISION AI PRO</h1>
        <p>Mühendislik Terminali · ISO 1219</p>
        <input type="password" id="apiKey" placeholder="Groq API Anahtarını Girin">
        <br>
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button onclick="analyze()">ANALİZ ET</button>
        <div id="result">Analiz sonuçları burada görünecek...</div>
    </div>

    <script>
       async function analyze() {
    const key = document.getElementById('apiKey').value;
    const fileInput = document.getElementById('imageInput');
    const resultDiv = document.getElementById('result');
    
    if(!key || !fileInput.files[0]) { 
        alert("Lütfen önce API anahtarınızı girin ve bir görsel seçin!"); 
        return; 
    }
    
    const file = fileInput.files[0];
    resultDiv.innerText = "⚡ Analiz başlatıldı... Yanıt bekleniyor.";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64Image = reader.result.split(',')[1];

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${key}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.2-90b-vision-preview", // Daha güçlü model
                    messages: [{
                        role: "user",
                        content: [
                            { type: "text", text: "Bu hidrolik şemayı veya parçayı ISO 1219 standartlarına göre analiz et." },
                            { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            
            // Hata ayıklama: Eğer API hata dönerse ekrana yazdır
            if (data.error) {
                resultDiv.innerHTML = `<span style="color:red">API Hatası: ${data.error.message}</span>`;
                return;
            }

            resultDiv.innerHTML = "<h3>✅ ANALİZ:</h3>" + data.choices[0].message.content;
            
        } catch (error) {
            resultDiv.innerHTML = `<span style="color:red">Bağlantı Hatası: ${error.message} <br> (Muhtemelen CORS engeli)</span>`;
        }
    };
}
       

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                resultDiv.innerHTML = "<h3>✅ ANALİZ RAPORU:</h3>" + data.choices[0].message.content.replace(/\n/g, "<br>");
            } else {
                resultDiv.innerText = "Hata: API'den yanıt alınamadı. Anahtarınızı kontrol edin.";
            }
        } catch (error) {
            resultDiv.innerText = "Bağlantı hatası: " + error.message;
        }
    };
}
    </script>
</body>
</html>
